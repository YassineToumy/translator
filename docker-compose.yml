services:
  translator:
    build: .
    container_name: scraper-translator
    restart: unless-stopped
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN}
      - TRANSLATE_URL=${TRANSLATE_URL:-http://83.228.244.116:8080}
      - BATCH_SIZE=${BATCH_SIZE:-5}
      - CYCLE_SLEEP=${CYCLE_SLEEP:-30}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
      - MAX_FIELD_LEN=${MAX_FIELD_LEN:-800}